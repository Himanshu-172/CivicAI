name: civic-ai

services:
  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/web.Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000/api
      VITE_SOCKET_URL: http://localhost:4000
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/api.Dockerfile
    ports:
      - "4000:4000"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/civicai
      MONGODB_CONNECT_ON_START: "true"
      JWT_ACCESS_SECRET: local-development-access-secret-change-me
      CORS_ORIGINS: http://localhost:5173
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      UPLOAD_DIRECTORY: uploads
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      mongo:
        condition: service_healthy

  ai-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/ai-service.Dockerfile
    ports:
      - "8000:8000"
    environment:
      YOLO_MODEL: yolov8n.pt
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mongo-data:
